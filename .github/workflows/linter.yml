# Deterministic PR lint: Super-Linter bundled many tools (incl. zizmor) and caused
# repeated CI-only failures. We lint workflows with actionlint only (fast, reproducible).
# Optional local checks: zizmor --config .github/linters/zizmor.yaml .github/workflows/
name: Lint Code Base

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint GitHub Actions workflows (actionlint)
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD":/repo -w /repo rhysd/actionlint:latest \
            -color -shellcheck .github/workflows/*.yml
