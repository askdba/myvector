name: Lint Code Base

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: read
  statuses: write

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Full git history is needed to get a proper list of changed files within `super-linter`
          fetch-depth: 0

      - name: Lint Code Base
        uses: github/super-linter@v6
        env:
          # Default is .github/linters; set explicitly so zizmor.yaml is resolved.
          LINTER_RULES_PATH: .github/linters
          DEFAULT_BRANCH: "main"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_CPP: "false"
          VALIDATE_CLANG_FORMAT: "false"
          VALIDATE_PERL: "false"
          VALIDATE_JSCPD: "false"
          VALIDATE_SQLFLUFF: "false"
          # textlint has no project ruleset in-repo; enable after adding .github/.textlintrc.json
          VALIDATE_NATURAL_LANGUAGE: "false"
