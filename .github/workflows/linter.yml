name: Lint Code Base

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: read
  statuses: write

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    env:
      # Opt into Node 24 for JS-based actions (see GitHub Actions Node 20 deprecation notice).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Full git history is needed to get a proper list of changed files within `super-linter`
          fetch-depth: 0

      - name: Lint Code Base
        uses: github/super-linter@v6
        env:
          # Default is .github/linters; keep explicit for actionlint / shared rule files.
          LINTER_RULES_PATH: .github/linters
          DEFAULT_BRANCH: "main"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # zizmor is version-sensitive vs bundled super-linter; it caused repeated CI-only
          # failures while actionlint was clean. Run actionlint only for GITHUB_ACTIONS.
          # Optional: run zizmor locally — docker run ... zizmor --config .github/linters/zizmor.yaml
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: "false"
          VALIDATE_CPP: "false"
          VALIDATE_CLANG_FORMAT: "false"
          VALIDATE_PERL: "false"
          VALIDATE_JSCPD: "false"
          VALIDATE_SQLFLUFF: "false"
          # textlint has no project ruleset in-repo; enable after adding .github/.textlintrc.json
          VALIDATE_NATURAL_LANGUAGE: "false"
