---
# .github/.linter.yaml
# Configuration for super-linter

# Disable all linters by default, and enable them one by one.
# This will help us focus on fixing one thing at a time.
DEFAULT_BRANCH: main
VALIDATE_ALL_CODEBASE: true
DISABLE_ERRORS: false
# Must match super-linter default (and linter.yml) so zizmor.yaml is found.
LINTER_RULES_PATH: .github/linters

# C++ configuration
VALIDATE_CPP: false
VALIDATE_CLANG_FORMAT: false
CPP_FILE_EXTENSIONS: ".cc,.cpp,.h"

# Perl configuration
VALIDATE_PERL: false

# textlint: enable after adding .github/.textlintrc.json with project rules
VALIDATE_NATURAL_LANGUAGE: false

# Ignore the include directory for JSCPD
JSCPD_CONFIG_FILE: .jscpd.json
